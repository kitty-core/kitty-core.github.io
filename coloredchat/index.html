<html>

  <script>
    (function() {
    /**
     * Kittyspeak Navigation Hub - Injection Module
     * Deploys a persistent, theme-aware navigation menu to the host DOM.
     */
    const initNavHub = () => {
        // Prevent duplicate injection
        if (document.getElementById('kc-nav-hub')) return;

        const styles = `
            :root {
                --kc-bg: #ffffff;
                --kc-border: #f9a8d4;
                --kc-text: #831843;
                --kc-accent: #ec4899;
                --kc-accent-hover: #db2777;
                --kc-header: #fce7f3;
                --kc-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.3);
            }

            #kc-nav-hub {
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                z-index: 999999;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            #kc-nav-menu {
                display: none;
                flex-direction: column;
                background-color: var(--kc-bg);
                border: 2px solid var(--kc-border);
                border-radius: 12px;
                margin-bottom: 1rem;
                padding: 0.5rem;
                width: 240px;
                box-shadow: var(--kc-shadow);
                transform-origin: bottom right;
                animation: kcPopIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            #kc-nav-menu.active {
                display: flex;
            }

            @keyframes kcPopIn {
                from { transform: scale(0.8); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }

            .kc-nav-link {
                text-decoration: none;
                color: var(--kc-text);
                padding: 0.85rem 1rem;
                border-radius: 8px;
                font-weight: 600;
                font-size: 14px;
                transition: background-color 0.2s, color 0.2s;
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .kc-nav-link:hover {
                background-color: var(--kc-header);
                color: var(--kc-accent-hover);
            }

            #kc-nav-toggle {
                background-color: var(--kc-accent);
                color: white;
                border: none;
                border-radius: 50%;
                width: 56px;
                height: 56px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--kc-shadow);
                transition: transform 0.2s, background-color 0.2s;
            }

            #kc-nav-toggle:hover {
                background-color: var(--kc-accent-hover);
                transform: scale(1.05);
            }

            #kc-nav-toggle svg {
                width: 28px;
                height: 28px;
                fill: currentColor;
            }

            @media (max-width: 768px) {
                #kc-nav-hub {
                    bottom: 1rem;
                    right: 1rem;
                }
            }
        `;

        // Inject Styles
        const styleSheet = document.createElement("style");
        styleSheet.innerText = styles;
        document.head.appendChild(styleSheet);

        // Create Elements
        const hubContainer = document.createElement('div');
        hubContainer.id = 'kc-nav-hub';

        hubContainer.innerHTML = `
            <div id="kc-nav-menu">
                <a href="https://kitty-core.github.io/" class="kc-nav-link">
                    <span>🏠</span> Kittyspeak
                </a>
                <a href="https://kitty-core.github.io/coloredchat" class="kc-nav-link">
                    <span>🎨</span> Colored Chat memorial
                </a>
                <a href="https://kitty-core.github.io/clangen" class="kc-nav-link">
                    <span>🐾</span> Clangen Patrol Editor
                </a>
            </div>
            <button id="kc-nav-toggle" title="Navigate Site">
                <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"></path></svg>
            </button>
        `;

        document.body.appendChild(hubContainer);

        // Logic
        const toggle = document.getElementById('kc-nav-toggle');
        const menu = document.getElementById('kc-nav-menu');

        toggle.addEventListener('click', (e) => {
            e.stopPropagation();
            const isActive = menu.classList.toggle('active');
            toggle.style.transform = isActive ? 'rotate(90deg) scale(1.05)' : 'rotate(0deg) scale(1)';
        });

        document.addEventListener('click', (e) => {
            if (!hubContainer.contains(e.target)) {
                menu.classList.remove('active');
                toggle.style.transform = 'rotate(0deg) scale(1)';
            }
        });
    };

    // Ensure DOM is ready before injection
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        initNavHub();
    } else {
        document.addEventListener('DOMContentLoaded', initNavHub);
    }
})();
  </script>

img {
  display: block;
  margin-left: auto;

}
.vcenter {
    display: block;
    margin-left: auto;

}
body {
    background-color: black;
}
h1 {
    font-family: Arial, Helvetica, sans-serif;
    color: rgb(0, 0, 0);
}
</style>
<head>
    <title>RIP COLORED CHATS</title>
</head>

<body>

    <h1 style="text-align: center; text-shadow: 0 0 5px rgb(255, 32, 225);">Goodbye, colored chats. You will be missed greatly.</h1>
    <h1 style="text-align: center; text-shadow: 0 0 5px rgb(255, 32, 225);">2025-2026</h1>
</body>

</html>
