<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kittyspeak Translator - SCRAPPED</title>
    <style>
        :root {
            /* Pink & White Theme */
            --bg-color: #fdf2f8;
            --panel-bg: #ffffff;
            --border-color: #f9a8d4;
            --text-primary: #831843;
            --text-secondary: #be185d;
            --accent: #ec4899;
            --accent-hover: #db2777;
            --header-bg: #fce7f3;
            /* Nav Hub Variables */
            --nav-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .translator-container {
            display: flex;
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            height: 450px;
            position: relative;
        }

        .scrapped-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-12deg);
            z-index: 100;
            pointer-events: none;
            width: 90%;
            text-align: center;
        }

        .scrapped-text {
            font-family: "Impact", "Arial Black", sans-serif;
            font-size: 8rem;
            color: rgba(220, 38, 38, 0.85);
            text-transform: uppercase;
            border: 15px solid rgba(220, 38, 38, 0.85);
            padding: 1rem 3rem;
            display: inline-block;
            letter-spacing: 5px;
            mix-blend-mode: multiply;
            user-select: none;
            white-space: nowrap;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            filter: grayscale(0.5) opacity(0.7);
        }

        .panel-header {
            padding: 0.85rem 1.25rem;
            background-color: var(--header-bg);
            border-bottom: 2px solid var(--border-color);
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 1.25rem;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            align-items: center;
            padding: 0 0.5rem;
            opacity: 0.5;
        }

        button.swap-btn {
            background-color: #9ca3af;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: not-allowed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.swap-btn svg {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }

        /* Nav Hub Styling */
        .nav-hub-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 1000;
        }

        .nav-menu {
            display: none;
            flex-direction: column;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1rem;
            padding: 0.5rem;
            width: 240px;
            box-shadow: var(--nav-shadow);
            transform-origin: bottom right;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-menu.active {
            display: flex;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            background-color: var(--header-bg);
            color: var(--accent-hover);
        }

        .nav-toggle-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--nav-shadow);
            transition: transform 0.2s;
        }

        .nav-toggle-btn:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        .nav-toggle-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        @media (max-width: 1024px) {
            .scrapped-text {
                font-size: 5rem;
                border-width: 10px;
            }
        }

        @media (max-width: 768px) {
            .translator-container {
                flex-direction: column;
                height: auto;
            }
            .scrapped-text {
                font-size: 3rem;
                border-width: 6px;
            }
            .controls {
                padding: 1rem 0;
                justify-content: center;
            }
            textarea {
                min-height: 200px;
            }
        }
    </style>
</head>
<body>

    <h1>Kittyspeak Translator</h1>
    <p class="subtitle">"WHAT THE FUCK IS KITTYCORE SAYING TO ME??" translator</p>

    <div class="translator-container">
        <div class="scrapped-overlay">
            <div class="scrapped-text">Scrapped project</div>
        </div>

        <div class="panel">
            <div class="panel-header">English</div>
            <textarea readonly placeholder="DISABLED"></textarea>
        </div>

        <div class="controls">
            <button class="swap-btn" disabled>
                <svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"></path></svg>
            </button>
        </div>

        <div class="panel">
            <div class="panel-header">Kittyspeak</div>
            <textarea readonly placeholder="DISABLED"></textarea>
        </div>
    </div>

    <div class="nav-hub-container" id="nav-hub">
        <div class="nav-menu" id="nav-menu">
            <a href="https://kitty-core.github.io/" class="nav-link">
                <span>🏠</span> Kittyspeak
            </a>
            <a href="https://kitty-core.github.io/coloredchat" class="nav-link">
                <span>🎨</span> Colored Chat memorial
            </a>
            <a href="https://kitty-core.github.io/clangen" class="nav-link">
                <span>🐾</span> Clangen Patrol Editor
            </a>
        </div>
        <button class="nav-toggle-btn" id="nav-toggle" title="Navigate Site">
            <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"></path></svg>
        </button>
    </div>

    <script>
        // Navigator logic
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');

        navToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            navMenu.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('nav-hub').contains(e.target)) {
                navMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
